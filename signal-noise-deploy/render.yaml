# Render blueprint — deploy with: New + → Blueprint → point at this repo.
services:
  - type: web
    name: signal-noise
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # NOTE: do NOT set ANTHROPIC_API_KEY here for a public link —
      # leave it unset so every visitor uses their own key (entered in the browser).
      # Set it only if you intend to pay for all usage, and gate the app behind a password first.
